<?xml version="1.0" encoding="UTF-8"?>
<!--
  Skiff logo — single-color sailboat, designed to read at 16x16 and scale
  to 1024x1024 without redesign. Three shapes: sail, mast, hull.
  Color is the skiff palette dark slate (matches skiff.json backgroundColor).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sail: filled triangle, top of mast → bottom-right -->
  <path d="M16 4 L16 22 L26 22 Z" fill="#1e1e2e"/>
  <!-- Mast: vertical stripe, slightly taller than sail so it pokes above -->
  <rect x="15" y="3" width="2" height="20" fill="#1e1e2e"/>
  <!-- Hull: trapezoid with curved bottom (boat shape) -->
  <path d="M2 23 L30 23 L26 28 Q16 31 6 28 Z" fill="#1e1e2e"/>
</svg>
